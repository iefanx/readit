<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReadIt</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReadIt">
    <link rel="apple-touch-icon" href="/assets/images/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home View -->
        <div id="home-view">
            <header class="home-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 3.8l6.8 14.2H5.2L12 5.8z"/></svg>
                    <h1>ReadIt</h1>
                </div>
            </header>

            <div class="stats-pill">
                <span class="icon-smile">😊</span> 
                Ready to read at your preferred speed
            </div>

            <section class="home-section">
                <h2>Text to Speech</h2>
                <div class="action-grid">
                    <button class="action-btn" id="btn-file">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        <span>File</span>
                    </button>
                    <input type="file" id="file-input" class="hidden" accept=".pdf,.txt,.md,.docx">
                    
                    <button class="action-btn" id="btn-paste">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        <span>Text</span>
                    </button>
                    
                    <button class="action-btn" id="btn-link">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        <span>Link</span>
                    </button>
                </div>
            </section>

            <section class="home-section">
                <h2>Continue</h2>
                <div class="carousel" id="continue-carousel">
                    <!-- Document Cards Injected Here -->
                </div>
            </section>
        </div>

        <!-- Player View -->
        <div id="player-view" class="hidden">
            <header class="top-bar">
                <button class="icon-btn" id="back-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="header-center">
                    <h1 id="app-title">ReadIt</h1>
                </div>
                <div class="menu-container">
                    <button class="icon-btn" id="menu-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                    </button>
                    <div class="dropdown-menu" id="settings-menu">
                        <div class="menu-item">
                            <label>Language</label>
                            <select id="lang-select">
                                <option value="en">English (en)</option>
                                <option value="ko">한국어 (ko)</option>
                                <option value="es">Español (es)</option>
                                <option value="pt">Português (pt)</option>
                                <option value="fr">Français (fr)</option>
                            </select>
                        </div>
                        <div class="menu-item">
                            <label>Quality Steps: <span id="steps-val">5</span></label>
                            <input type="range" id="steps-input" min="1" max="20" value="5">
                        </div>
                        <div class="menu-divider"></div>
                        <button class="menu-btn-action" id="download-full-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download Full Audio
                        </button>
                        <button class="menu-btn-action" id="delete-doc-btn" style="color: #ef4444;">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            Delete Document
                        </button>
                    </div>
                </div>
            </header>

            <main class="content-area">
                <div class="text-container">
                    <textarea id="text-input" placeholder="Type or paste your text here to begin..." spellcheck="false"></textarea>
                    <div id="reading-display" class="hidden"></div>
                </div>
            </main>

            <div class="bottom-player-container">
                <div class="player-pill">
                    <div class="read-progress-container" id="read-progress-container">
                        <div class="read-progress-track">
                            <div class="read-progress-fill" id="read-progress-fill"></div>
                        </div>
                    </div>
                    <div class="player-left">
                        <button class="voice-btn" id="voice-btn">
                            <span class="voice-icon">M1</span>
                        </button>
                        <div class="voice-dropdown" id="voice-dropdown">
                            <div class="voice-group">Male</div>
                            <div class="voice-options">
                                <button class="v-opt active" data-val="M1">M1</button>
                                <button class="v-opt" data-val="M2">M2</button>
                                <button class="v-opt" data-val="M3">M3</button>
                                <button class="v-opt" data-val="M4">M4</button>
                                <button class="v-opt" data-val="M5">M5</button>
                            </div>
                            <div class="voice-group">Female</div>
                            <div class="voice-options">
                                <button class="v-opt" data-val="F1">F1</button>
                                <button class="v-opt" data-val="F2">F2</button>
                                <button class="v-opt" data-val="F3">F3</button>
                                <button class="v-opt" data-val="F4">F4</button>
                                <button class="v-opt" data-val="F5">F5</button>
                            </div>
                        </div>
                    </div>

                    <div class="player-center">
                        <button class="control-btn" id="rw-btn" title="Rewind 10s">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                            <span class="seek-label">10</span>
                        </button>
                        
                        <button class="play-btn" id="play-pause-btn">
                            <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <svg id="icon-pause" class="hidden" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </button>
                        
                        <button class="control-btn" id="ff-btn" title="Forward 10s">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                            <span class="seek-label">10</span>
                        </button>
                    </div>

                    <div class="player-right">
                        <button class="speed-btn" id="speed-btn">1.0x</button>
                        <div class="speed-dropdown" id="speed-dropdown">
                            <button class="s-opt" data-val="0.75">0.75x</button>
                            <button class="s-opt active" data-val="1.0">1.0x</button>
                            <button class="s-opt" data-val="1.25">1.25x</button>
                            <button class="s-opt" data-val="1.5">1.5x</button>
                            <button class="s-opt" data-val="2.0">2.0x</button>
                        </div>
                    </div>
                </div>
                
                <div class="generation-status" id="gen-status">
                    <span class="gen-dot"></span> Generating chunks... (<span id="gen-progress">0</span>%)
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="overlay">
        <div class="loader-content">
            <div class="loader-icon-container">
                <div class="spinner-ring"></div>
                <div class="spinner-ring inner"></div>
                <svg class="loader-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 3.8l6.8 14.2H5.2L12 5.8z"/></svg>
            </div>
            <h2 id="loading-title">Initializing ReadIt</h2>
            <p id="loading-text">Loading AI Models...</p>
            <div class="progress-container">
                <div class="progress-bar"><div id="load-progress" class="progress-fill"></div></div>
            </div>
            <p id="loading-subtext" class="hidden">This is a one-time download. Next time, models will load instantly from your device.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.24.3/dist/ort.all.min.js"></script>
    <script type="module" src="/main.js"></script>
</body>
</html>
